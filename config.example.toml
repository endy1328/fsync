# 전역 애플리케이션 설정
[app]
# 동시에 실행할 수 있는 최대 job 수
max_workers = 8
# Python 표준 로그 레벨
log_level = "INFO"

# 예시: source 하나를 여러 target으로 동기화
[[jobs]]
name = "sample-job"
source = "/absolute/path/to/source"
targets = [
  "/absolute/path/to/target-a",
  "/absolute/path/to/target-b",
  "/absolute/path/to/target-c",
]
# polling 주기(초)
interval_seconds = 60
# true이면 source에서 삭제된 파일도 모든 target에서 제거
copy_deleted = false

# 예시: 첫 번째 job과 병렬로 동작하는 두 번째 독립 job
[[jobs]]
name = "media-backup"
source = "/absolute/path/to/media"
targets = [
  "/absolute/path/to/media-backup",
]
interval_seconds = 300
copy_deleted = false
